#
# Test .Net Core projects with code coverage
#
parameters:
  configuration: 'Release'
  framework: net10.0
  agent: 'linux'
  poolImage: 'ubuntu-24.04'
  jobnamesuffix: 'net100cc'
  customtestarget: ''
  # See ci.yml: passing pool config via parameter because root-pipeline
  # variables defined in ${{ if ... }}: blocks aren't reliably visible to
  # included templates at compile-time.
  poolName: ''
jobs:
- job: testcc${{ parameters.jobnamesuffix }}
  displayName: Coverage ${{ parameters.agent }} ${{ parameters.configuration }}
  variables:
    DOTNET_CLI_TELEMETRY_OPTOUT: true
    DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
    disable.coverage.autogenerate: true
    CustomTestTarget: ${{ parameters.customtestarget }}
    ${{ if eq( parameters.customtestarget, '' ) }}:
      DotCliCommandline: '--framework ${{ parameters.framework }}'
    ${{ else }}:
      DotCliCommandline: '/p:CustomTestTarget=${{ parameters.customtestarget }}'
  pool:
    ${{ if ne(parameters.poolName, '') }}:
      name: ${{ parameters.poolName }}
      demands:
        - ImageOverride -equals ${{ parameters.poolImage }}
    ${{ else }}:
      vmImage: ${{ parameters.poolImage }}
  steps:
  - task: UseDotNet@2
    displayName: 'Install .NET 8.0'
    condition: eq('${{parameters.framework}}', 'net8.0')
    inputs:
      packageType: 'sdk'
      version: '8.0.x'
  - task: UseDotNet@2
    displayName: 'Install .NET 9.0'
    condition: eq('${{parameters.framework}}', 'net9.0')
    inputs:
      packageType: 'sdk'
      version: '9.0.x'
  - task: UseDotNet@2
    displayName: 'Install .NET 10.0'
    inputs:
      packageType: 'sdk'
      version: '10.0.x'
  - task: NuGetToolInstaller@1
    inputs:
      versionSpec: '>=7.0.x'
  - task: DownloadSecureFile@1
    name: fuzzingartifacts
    displayName: 'Download Fuzzing artifacts'
    inputs:
      secureFile: 'FuzzingArtifacts.zip'
  - task: PowerShell@2
    displayName: Versioning
    inputs:
      targetType: filePath
      filePath: ./.azurepipelines/set-version.ps1
  - task: ExtractFiles@1
    displayName: 'Extract Fuzzing artifacts'
    condition: ne(variables['fuzzingartifacts.secureFilePath'], '')
    inputs:
      archiveFilePatterns: '$(Agent.TempDirectory)/FuzzingArtifacts.zip'
      destinationFolder: ./Fuzzing/Opc.Ua.Encoders.Fuzz.Tests
      cleanDestinationFolder: false
      overwriteExistingFiles: true
    continueOnError: true
  - task: DotNetCoreCLI@2
    displayName: Restore ${{ parameters.framework }}
    inputs:
      command: restore
      projects: 'UA.slnx'
      arguments: '${{ variables.DotCliCommandline }} --configuration ${{ parameters.configuration }}'
  - task: DotNetCoreCLI@2
    displayName: Test ${{ parameters.framework }}
    timeoutInMinutes: 60
    inputs:
      command: test
      projects: |
        **/*.Tests.csproj
        !**/Opc.Ua.Aot.Tests.csproj
      # --blame (plain) + --blame-hang-timeout 5m: name the in-flight test when
      # the test host hangs OR crashes (sequence collector); abort any single
      # test exceeding 5 min. --blame-hang-dump-type 'none' keeps artifacts
      # small. We intentionally do NOT add --blame-crash because
      # --blame-crash-dump-type does not accept 'none' (only full/mini); plain
      # --blame already names the in-flight test on crash via the Sequence file.
      # See test.yml for the full background (build 14598 log 933 silent hang,
      # build 14707 log 1067 crash with no name surfaced).
      # note: /p:CollectCoverage=true is only used to disable deterministic builds
      arguments: '--no-restore ${{ variables.DotCliCommandline }} --configuration ${{ parameters.configuration }} /p:CollectCoverage=true --collect:"XPlat Code Coverage" --settings ./Tests/coverlet.runsettings.xml --results-directory $(Agent.TempDirectory) --blame --blame-hang-timeout 5m --blame-hang-dump-type none'
      publishTestResults: false
  - script: |
      bash <(curl -s https://codecov.io/bash) -s $(Agent.TempDirectory)

    continueOnError: true
    condition: ne( variables['CODECOV_TOKEN'], '')
    env:
      CODECOV_TOKEN: $(CODECOV_TOKEN)
    displayName: 'Upload to codecov.io'
  - task: DotNetCoreCLI@2
    inputs:
      command: custom
      custom: tool
      arguments: install --tool-path tools dotnet-reportgenerator-globaltool
    displayName: Install ReportGenerator tool
  - script: |
      tools/reportgenerator -reports:$(Agent.TempDirectory)/**/????????-*/coverage.cobertura.xml -targetdir:$(Build.SourcesDirectory)/CodeCoverage "-reporttypes:Cobertura;HtmlSummary" "-title:UA .Net Standard Test Coverage" "-assemblyfilters:-*.Tests"
      mv $(Build.SourcesDirectory)/CodeCoverage/summary.htm $(Build.SourcesDirectory)/CodeCoverage/index.htm

    displayName: Create Code Coverage Report
    continueOnError: true
  - task: PublishCodeCoverageResults@2
    displayName: 'Publish code coverage'
    inputs:
      summaryFileLocation: '$(Build.SourcesDirectory)/CodeCoverage/Cobertura.xml'
    continueOnError: true
  - script: |
      bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r $REPORT_LOCATION --commit-uuid $COMMIT_UUID

    condition: ne( variables['CODACY_PROJECT_TOKEN'], '')
    env:
      CODACY_PROJECT_TOKEN: $(CODACY_PROJECT_TOKEN)
      REPORT_LOCATION: '$(Build.SourcesDirectory)/CodeCoverage/Cobertura.xml'
      COMMIT_UUID: '$(Build.SourceVersion)'
    continueOnError: true
    displayName: 'Upload to Codacy'
  - task: PublishBuildArtifacts@1
    displayName: 'Publish Fuzzing artifacts on failure'
    condition: and(failed(), ne(variables['fuzzingartifacts.secureFilePath'], ''))
    inputs:
      PathtoPublish: '$(Agent.TempDirectory)/FuzzingArtifacts.zip'