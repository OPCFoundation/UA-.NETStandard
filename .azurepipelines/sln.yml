#
# Build a matrix of (solution × tfm × configuration) on windows.
# Each matrix entry becomes a parallel job with its own 60-minute timeout.
#
# Parameters:
#   solutions  - Comma-separated list of .slnx paths to build. When empty,
#                every .slnx file in the repository is discovered and built.
#   tfms       - Comma-separated list of target frameworks. When non-empty,
#                each matrix entry restricts the solution build to a single
#                TFM via `/p:CustomTestTarget=$(targetTfm)`.  When empty the
#                matrix only spans solution × configuration and the solution
#                is built for every TFM declared by its projects.
#
# Matrix entries supply these variables:
#   file           - path of the .slnx file
#   configuration  - Debug or Release
#   targetTfm      - target framework moniker (only when 'tfms' is non-empty)
#
parameters:
  poolImage: 'windows-2025-vs2026'
  jobnamesuffix: ''
  solutions: ''
  tfms: ''
  # See ci.yml: passing pool config via parameter because root-pipeline
  # variables defined in ${{ if ... }}: blocks aren't reliably visible to
  # included templates at compile-time.
  poolName: ''

jobs:
- job: buildslnprep${{ parameters.jobnamesuffix }}
  displayName: Prepare Build Solutions Jobs
  pool:
    ${{ if ne(parameters.poolName, '') }}:
      name: ${{ parameters.poolName }}
      demands:
        - ImageOverride -equals ${{ parameters.poolImage }}
    ${{ else }}:
      vmImage: ${{ parameters.poolImage }}
  steps:
  - task: PowerShell@2
    name: solutionmatrix
    displayName: Prepare Solution Matrix
    inputs:
      targetType: filePath
      filePath: ./.azurepipelines/get-matrix.ps1
      arguments: -FileName '*.slnx' -Configurations 'Debug,Release' -Files "${{ parameters.solutions }}" -Tfms "${{ parameters.tfms }}"

- job: buildallsln${{ parameters.jobnamesuffix }}
  displayName: Build Solution
  timeoutInMinutes: 120
  dependsOn: buildslnprep${{ parameters.jobnamesuffix }}
  strategy:
    matrix: $[ dependencies.buildslnprep${{ parameters.jobnamesuffix }}.outputs['solutionmatrix.jobMatrix'] ]
  pool:
    ${{ if ne(parameters.poolName, '') }}:
      name: ${{ parameters.poolName }}
      demands:
        - ImageOverride -equals ${{ parameters.poolImage }}
    ${{ else }}:
      vmImage: ${{ parameters.poolImage }}
  variables:
    # When the matrix supplies a per-entry `targetTfm`, pass it through to
    # `dotnet build` so the solution build is restricted to that single TFM
    # (the repo's targets.props maps `CustomTestTarget=<tfm>` onto every
    # `*TargetFrameworks` MSBuild property).  When `targetTfm` is empty the
    # property expansion is harmless and projects build all their TFMs.
    TfmBuildProperty: /p:CustomTestTarget=$(targetTfm)
  steps:
  - task: UseDotNet@2
    displayName: 'Install .NET 10.0'
    inputs:
      packageType: 'sdk'
      version: '10.0.x'
  - task: NuGetToolInstaller@1
    inputs:
      versionSpec: '>=7.0.x'
  - task: PowerShell@2
    displayName: Versioning
    inputs:
      targetType: filePath
      filePath: ./.azurepipelines/set-version.ps1
  - task: DotNetCoreCLI@2
    displayName: Restore $(configuration) $(file) $(targetTfm)
    inputs:
      command: restore
      projects: $(file)
      arguments: '--configuration $(configuration) $(TfmBuildProperty)'
  - task: DotNetCoreCLI@2
    displayName: Build $(configuration) $(file) $(targetTfm)
    inputs:
      command: build
      projects: $(file)
      arguments: '--no-restore --configuration $(configuration) $(TfmBuildProperty) /p:Platform="Any CPU" /p:BuildInParallel=true'
