#
# Test Opc.Ua.Aot.Tests with native AOT publish using Microsoft Testing Platform
#
parameters:
  configuration: 'Release'
  agents: '@{}'
  jobnamesuffix: ''
jobs:
- job: testaotprep${{ parameters.jobnamesuffix }}
  displayName: Prepare AoT Test Jobs ${{ parameters.configuration }}
  pool:
    vmImage: 'windows-2025-vs2026'
  variables:
    DOTNET_CLI_TELEMETRY_OPTOUT: true
    DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  steps:
  - task: PowerShell@2
    name: aotmatrix
    displayName: Prepare AoT Tests
    inputs:
      targetType: filePath
      filePath: ./.azurepipelines/get-matrix.ps1
      arguments: -FileName Opc.Ua.Aot.Tests.csproj -AgentTable ${{ parameters.agents }}
- job: testaot${{ parameters.jobnamesuffix }}
  displayName: AoT Tests
  dependsOn: testaotprep${{ parameters.jobnamesuffix }}
  timeoutInMinutes: 30
  strategy:
    matrix: $[dependencies.testaotprep${{ parameters.jobnamesuffix }}.outputs['aotmatrix.jobMatrix'] ]
  variables:
    DOTNET_CLI_TELEMETRY_OPTOUT: true
    DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  pool:
    vmImage: $(poolImage)
  steps:
  - task: UseDotNet@2
    displayName: 'Install .NET 10.0'
    inputs:
      packageType: 'sdk'
      version: '10.0.x'
  - task: NuGetToolInstaller@1
    inputs:
      versionSpec: '>=7.0.x'
  - task: PowerShell@2
    displayName: Versioning
    inputs:
      targetType: filePath
      filePath: ./.azurepipelines/set-version.ps1
  - task: DotNetCoreCLI@2
    displayName: Publish AoT Tests ${{ parameters.configuration }}
    inputs:
      command: publish
      publishWebProjects: false
      projects: $(file)
      arguments: '--configuration ${{ parameters.configuration }}'
      zipAfterPublish: false
      modifyOutputPath: false
  - task: PowerShell@2
    displayName: Run AoT Tests
    inputs:
      pwsh: true
      targetType: inline
      script: |
        $publishDir = Get-ChildItem -Path "$(folder)/bin/${{ parameters.configuration }}/net10.0/*/publish" -Directory | Select-Object -First 1
        if (-not $publishDir) {
          Write-Error "No publish directory found."
          exit 1
        }
        if ($IsWindows) {
          $exe = Join-Path $publishDir.FullName "Opc.Ua.Aot.Tests.exe"
        } else {
          $exe = Join-Path $publishDir.FullName "Opc.Ua.Aot.Tests"
        }
        Write-Host "Running: $exe"
        & $exe
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
