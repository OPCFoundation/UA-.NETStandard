#
# Build all .Net Core projects on all platforms
#
parameters:
  buildoption: ''
  framework: net10.0
  jobnamesuffix: ''
  agents: '@{}'
  # Caller passes the resolved managed-pool name (empty string when targeting
  # Microsoft-hosted agents) and the Windows image alias to use as either the
  # pool ImageOverride demand or the hosted vmImage.  Passing these as
  # parameters avoids relying on root-pipeline variables defined inside
  # ${{ if ... }}: blocks, which aren't reliably visible to included
  # templates at compile-time.
  poolName: ''
  windowsImage: 'windows-2025-vs2026'
jobs:
- job: buildprep${{ parameters.jobnamesuffix }}
  displayName: Prepare Build Jobs
  pool:
    ${{ if ne(parameters.poolName, '') }}:
      name: ${{ parameters.poolName }}
      demands:
        - ImageOverride -equals ${{ parameters.windowsImage }}
    ${{ else }}:
      vmImage: ${{ parameters.windowsImage }}
  variables:
    DOTNET_CLI_TELEMETRY_OPTOUT: true
    DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  steps:
  - task: PowerShell@2
    name: buildmatrix
    displayName: Prepare Solutions
    inputs:
      targetType: filePath
      filePath: ./.azurepipelines/get-matrix.ps1
      arguments: -FileName azure-pipelines.yml -AgentTable ${{ parameters.agents }}
- job: buildall${{ parameters.jobnamesuffix }}
  displayName: Build
  timeoutInMinutes: 150
  dependsOn: buildprep${{ parameters.jobnamesuffix }}
  strategy:
    matrix: $[dependencies.buildprep${{ parameters.jobnamesuffix }}.outputs['buildmatrix.jobMatrix'] ]
  pool:
    ${{ if ne(parameters.poolName, '') }}:
      name: ${{ parameters.poolName }}
      demands:
        - ImageOverride -equals $(poolImage)
    ${{ else }}:
      vmImage: $(poolImage)
  steps:
  - task: NuGetToolInstaller@1
    inputs:
      versionSpec: '>=7.0.x'
  - task: UseDotNet@2
    displayName: 'Install .NET 10.0'
    inputs:
      packageType: 'sdk'
      version: '10.0.x'
  - task: PowerShell@2
    displayName: Versioning
    inputs:
      targetType: filePath
      filePath: ./.azurepipelines/set-version.ps1
  - task: DotNetCoreCLI@2
    displayName: Release Build
    inputs:
      command: build
      projects: '**/@(Console|NetCore)*.csproj'
      arguments: '--framework ${{ parameters.framework }} --configuration Release ${{ parameters.buildoption }} /p:RCS=true'
  - task: DotNetCoreCLI@2
    displayName: Release Pack
    condition: eq(variables['poolImage'], '${{ parameters.windowsImage }}')
    inputs:
      command: pack
      packagesToPack:  '**/Opc.Ua.*.csproj'
      configuration: Release
      configurationToPack: Release
  - task: DotNetCoreCLI@2
    displayName: Debug Build
    inputs:
      command: build
      projects: '**/@(Console|NetCore)*.csproj'
      arguments: '--framework ${{ parameters.framework }} --configuration Debug ${{ parameters.buildoption }} /p:RCS=true'
  - task: DotNetCoreCLI@2
    displayName: Debug Pack
    condition: eq(variables['poolImage'], '${{ parameters.windowsImage }}')
    inputs:
      command: pack
      packagesToPack:  '**/Opc.Ua.*.csproj'
      configuration: Debug
      configurationToPack: Debug
