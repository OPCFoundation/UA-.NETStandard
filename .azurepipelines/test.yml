#
# Test all .Net Core projects on all platforms
#
parameters:
- name: configuration
  type: string
  default: 'Release'
- name: framework
  type: string
  default: net8.0
- name: agents
  type: string
  default: '@{}'
- name: jobnamesuffix
  type: string
  default: ''
- name: customtestarget
  type: string
  default: ''
# Set hosted=true to force all jobs in this template invocation onto
# Microsoft-hosted agents (bypasses the netstandard managed DevOps pool).
# Use this for stages that target macOS, which the managed pool does not
# provide.
- name: hosted
  type: boolean
  default: false
# See ci.yml: passing pool config via parameters because root-pipeline
# variables defined in ${{ if ... }}: blocks aren't reliably visible to
# included templates at compile-time.
- name: poolName
  type: string
  default: ''
- name: windowsImage
  type: string
  default: 'windows-2025-vs2026'
# Optional job-level condition forwarded to both the testprep… and testall… jobs.
# When unset (the overwhelming majority of callers) no `condition:` line is
# emitted - preserves today's "always run" behaviour exactly.  When set, both
# jobs receive the same condition so the entire test invocation is gated
# together (used by the root pipeline to skip macOS test invocations on draft
# GitHub PRs).  The forwarded condition is always wrapped in succeeded() so a
# build cancellation still propagates to these jobs - without the wrapper an
# Azure Pipelines `condition:` re-evaluates to true during cancel and the job
# keeps running (see "Job will continue running after cancellation was
# requested because its condition re-evaluated to true" warnings).
- name: condition
  type: string
  default: ''
jobs:
- job: testprep${{ parameters.jobnamesuffix }}
  displayName: Prepare Test Jobs ${{ parameters.configuration }} (${{ parameters.framework }})
  ${{ if ne(parameters.condition, '') }}:
    condition: and(succeeded(), ${{ parameters.condition }})
  pool:
    ${{ if ne(parameters.poolName, '') }}:
      name: ${{ parameters.poolName }}
      demands:
        - ImageOverride -equals ${{ parameters.windowsImage }}
    ${{ else }}:
      vmImage: ${{ parameters.windowsImage }}
  variables:
    DOTNET_CLI_TELEMETRY_OPTOUT: true
    DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  steps:
  - task: PowerShell@2
    name: testmatrix
    displayName: Prepare Tests
    inputs:
      targetType: filePath
      filePath: ./.azurepipelines/get-matrix.ps1
      arguments: -FileName *.Tests.csproj -ExcludeFileName "Opc.Ua.Aot.Tests.csproj,Opc.Ua.Stress.Tests.csproj,Opc.Ua.Subscriptions.Durable.Tests.csproj" -AgentTable ${{ parameters.agents }}
- job: testall${{ parameters.jobnamesuffix }}
  displayName: Tests (${{ parameters.framework }})
  dependsOn: testprep${{ parameters.jobnamesuffix }}
  ${{ if ne(parameters.condition, '') }}:
    condition: and(succeeded(), ${{ parameters.condition }})
  timeoutInMinutes: 180
  strategy:
    matrix: $[dependencies.testprep${{ parameters.jobnamesuffix }}.outputs['testmatrix.jobMatrix'] ]
  variables:
    DOTNET_CLI_TELEMETRY_OPTOUT: true
    DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
    CustomTestTarget: ${{ parameters.customtestarget }}
    ${{ if eq( parameters.customtestarget, '' ) }}:
      DotCliCommandline: '--framework ${{ parameters.framework }}'
    ${{ else }}:
      DotCliCommandline: '/p:CustomTestTarget=${{ parameters.customtestarget }}'
  pool:
    ${{ if and(ne(parameters.poolName, ''), not(parameters.hosted)) }}:
      name: ${{ parameters.poolName }}
      demands:
        - ImageOverride -equals $(poolImage)
    ${{ else }}:
      vmImage: $(poolImage)
  steps:
  - task: UseDotNet@2
    displayName: 'Install .NET 8.0'
    condition: eq('${{parameters.framework}}', 'net8.0')
    inputs:
      packageType: 'sdk'
      version: '8.0.x'
  - task: UseDotNet@2
    displayName: 'Install .NET 9.0'
    condition: eq('${{parameters.framework}}', 'net9.0')
    inputs:
      packageType: 'sdk'
      version: '9.0.x'
  - task: UseDotNet@2
    displayName: 'Install .NET 10.0'
    inputs:
      packageType: 'sdk'
      version: '10.0.x'
  - task: NuGetToolInstaller@1
    inputs:
      versionSpec: '>=7.0.x'
  - task: PowerShell@2
    displayName: Versioning
    inputs:
      targetType: filePath
      filePath: ./.azurepipelines/set-version.ps1
  - task: DownloadSecureFile@1
    name: fuzzingartifacts
    displayName: 'Download Fuzzing artifacts'
    # Only the Opc.Ua.Encoders.Fuzz.Tests matrix entry consumes these crash-seed
    # assets; gating the download saves a secure-file fetch + ~28k 'inflating:
    # crash-*' log lines on every other matrix entry (observed pre-fix on mac
    # build 14598 log 652).  testcc.yml still pulls the artifacts unconditionally
    # because that single combined coverage job runs every *.Tests.csproj
    # including Fuzz.Tests in one go.
    condition: contains(variables['file'], 'Fuzz.Tests')
    inputs:
      secureFile: 'FuzzingArtifacts.zip'
  - task: ExtractFiles@1
    displayName: 'Extract Fuzzing artifacts'
    condition: and(contains(variables['file'], 'Fuzz.Tests'), ne(variables['fuzzingartifacts.secureFilePath'], ''))
    inputs:
      archiveFilePatterns: '$(Agent.TempDirectory)/FuzzingArtifacts.zip'
      destinationFolder: ./Fuzzing/Opc.Ua.Encoders.Fuzz.Tests
      cleanDestinationFolder: false
      overwriteExistingFiles: true
    continueOnError: true
  - task: DotNetCoreCLI@2
    displayName: Restore ${{ parameters.configuration }}
    inputs:
      command: restore
      projects: $(file)
      arguments: '${{ variables.DotCliCommandline }} --configuration ${{ parameters.configuration }}'
  - task: DotNetCoreCLI@2
    displayName: Test ${{ parameters.configuration }}
    timeoutInMinutes: 90
    inputs:
      command: test
      projects: $(file)
      # --blame (plain): enables the sequence collector so the in-flight test
      # name lands in the trx attachment when the test host hangs OR crashes.
      # --blame-hang-timeout 5m kills any single test exceeding 5 min
      # (LongRunning/Stress already filtered out; legit tests in this suite
      # cap at ~60 s, so 5 min is comfortable headroom). --blame-hang-dump-type
      # 'none' keeps artifacts small - we want the named culprit, not GB of
      # process state. We intentionally do NOT add --blame-crash because
      # --blame-crash-dump-type does not accept 'none' (only full/mini) and we
      # don't want dump bloat; plain --blame already names the in-flight test
      # on a crash via the Sequence file.
      # Background: mac PR build 14598 log 933 burned the full 90-min step
      # timeout on a silent hang with no diagnostics. PR #3872 caught the hang
      # at 10 min but did not name the test (Sequence file not enabled). This
      # iteration enables --blame so the next hang/crash points at a specific
      # test name.
      # --logger trx + --results-directory: emit trx ourselves; publishTestResults
      # is false below so a transient publish DNS hiccup cannot flip the job.
      arguments: '--no-restore ${{ variables.DotCliCommandline }} --configuration ${{ parameters.configuration }} --filter "TestCategory!=LongRunning&TestCategory!=Stress" --blame --blame-hang-timeout 5m --blame-hang-dump-type none --logger trx --results-directory $(Agent.TempDirectory)'
      publishTestResults: false
  - task: PublishTestResults@2
    displayName: 'Publish Test Results ${{ parameters.configuration }} (${{ parameters.framework }})'
    # succeededOrFailed() so test results land in AzDO even when tests failed;
    # continueOnError so a transient publish failure (e.g. macOS hosted agent DNS
    # hiccup against opcfoundation.visualstudio.com) does not flip the job to
    # failed when the actual tests already passed.
    condition: succeededOrFailed()
    continueOnError: true
    inputs:
      testResultsFormat: VSTest
      testResultsFiles: '$(Agent.TempDirectory)/*.trx'
      mergeTestResults: true
      failTaskOnFailedTests: false
      testRunTitle: '${{ parameters.framework }} ${{ parameters.configuration }} - $(Agent.JobName)'
  - task: PublishBuildArtifacts@1
    displayName: 'Publish Fuzzing artifacts on failure'
    condition: and(failed(), contains(variables['file'], 'Fuzz.Tests'), ne(variables['fuzzingartifacts.secureFilePath'], ''))
    inputs:
      PathtoPublish: '$(Agent.TempDirectory)/FuzzingArtifacts.zip'