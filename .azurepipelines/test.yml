#
# Test all .Net Core projects on all platforms
#
parameters:
- name: configuration
  type: string
  default: 'Release'
- name: framework
  type: string
  default: net8.0
- name: agents
  type: string
  default: '@{}'
- name: jobnamesuffix
  type: string
  default: ''
- name: customtestarget
  type: string
  default: ''
# Set hosted=true to force all jobs in this template invocation onto
# Microsoft-hosted agents (bypasses the netstandard managed DevOps pool).
# Use this for stages that target macOS, which the managed pool does not
# provide.
- name: hosted
  type: boolean
  default: false
# See ci.yml: passing pool config via parameters because root-pipeline
# variables defined in ${{ if ... }}: blocks aren't reliably visible to
# included templates at compile-time.
- name: poolName
  type: string
  default: ''
- name: windowsImage
  type: string
  default: 'windows-2025-vs2026'
# Optional job-level condition forwarded to both the testprep… and testall… jobs.
# When unset (the overwhelming majority of callers) no `condition:` line is
# emitted - preserves today's "always run" behaviour exactly.  When set, both
# jobs receive the same condition so the entire test invocation is gated
# together (used by the root pipeline to skip macOS test invocations on draft
# GitHub PRs).  The forwarded condition is always wrapped in succeeded() so a
# build cancellation still propagates to these jobs - without the wrapper an
# Azure Pipelines `condition:` re-evaluates to true during cancel and the job
# keeps running (see "Job will continue running after cancellation was
# requested because its condition re-evaluated to true" warnings).
- name: condition
  type: string
  default: ''
jobs:
- job: testprep${{ parameters.jobnamesuffix }}
  displayName: Prepare Test Jobs ${{ parameters.configuration }} (${{ parameters.framework }})
  ${{ if ne(parameters.condition, '') }}:
    condition: and(succeeded(), ${{ parameters.condition }})
  pool:
    ${{ if ne(parameters.poolName, '') }}:
      name: ${{ parameters.poolName }}
      demands:
        - ImageOverride -equals ${{ parameters.windowsImage }}
    ${{ else }}:
      vmImage: ${{ parameters.windowsImage }}
  variables:
    DOTNET_CLI_TELEMETRY_OPTOUT: true
    DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  steps:
  - task: PowerShell@2
    name: testmatrix
    displayName: Prepare Tests
    inputs:
      targetType: filePath
      filePath: ./.azurepipelines/get-matrix.ps1
      arguments: -FileName *.Tests.csproj -ExcludeFileName "Opc.Ua.Aot.Tests.csproj,Opc.Ua.Stress.Tests.csproj,Opc.Ua.Subscriptions.Durable.Tests.csproj" -AgentTable ${{ parameters.agents }}
- job: testall${{ parameters.jobnamesuffix }}
  displayName: Tests (${{ parameters.framework }})
  dependsOn: testprep${{ parameters.jobnamesuffix }}
  ${{ if ne(parameters.condition, '') }}:
    condition: and(succeeded(), ${{ parameters.condition }})
  timeoutInMinutes: 180
  strategy:
    matrix: $[dependencies.testprep${{ parameters.jobnamesuffix }}.outputs['testmatrix.jobMatrix'] ]
  variables:
    DOTNET_CLI_TELEMETRY_OPTOUT: true
    DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
    CustomTestTarget: ${{ parameters.customtestarget }}
    ${{ if eq( parameters.customtestarget, '' ) }}:
      DotCliCommandline: '--framework ${{ parameters.framework }}'
    ${{ else }}:
      DotCliCommandline: '/p:CustomTestTarget=${{ parameters.customtestarget }}'
  pool:
    ${{ if and(ne(parameters.poolName, ''), not(parameters.hosted)) }}:
      name: ${{ parameters.poolName }}
      demands:
        - ImageOverride -equals $(poolImage)
    ${{ else }}:
      vmImage: $(poolImage)
  steps:
  - task: UseDotNet@2
    displayName: 'Install .NET 8.0'
    condition: eq('${{parameters.framework}}', 'net8.0')
    inputs:
      packageType: 'sdk'
      version: '8.0.x'
  - task: UseDotNet@2
    displayName: 'Install .NET 9.0'
    condition: eq('${{parameters.framework}}', 'net9.0')
    inputs:
      packageType: 'sdk'
      version: '9.0.x'
  - task: UseDotNet@2
    displayName: 'Install .NET 10.0'
    inputs:
      packageType: 'sdk'
      version: '10.0.x'
  - task: NuGetToolInstaller@1
    inputs:
      versionSpec: '>=7.0.x'
  - task: PowerShell@2
    displayName: Versioning
    inputs:
      targetType: filePath
      filePath: ./.azurepipelines/set-version.ps1
  - task: DownloadSecureFile@1
    name: fuzzingartifacts
    displayName: 'Download Fuzzing artifacts'
    # Only the Opc.Ua.Encoders.Fuzz.Tests matrix entry consumes these crash-seed
    # assets; gating the download saves a secure-file fetch + ~28k 'inflating:
    # crash-*' log lines on every other matrix entry (observed pre-fix on mac
    # build 14598 log 652).  testcc.yml still pulls the artifacts unconditionally
    # because that single combined coverage job runs every *.Tests.csproj
    # including Fuzz.Tests in one go.
    condition: contains(variables['file'], 'Fuzz.Tests')
    inputs:
      secureFile: 'FuzzingArtifacts.zip'
  - task: ExtractFiles@1
    displayName: 'Extract Fuzzing artifacts'
    condition: and(contains(variables['file'], 'Fuzz.Tests'), ne(variables['fuzzingartifacts.secureFilePath'], ''))
    inputs:
      archiveFilePatterns: '$(Agent.TempDirectory)/FuzzingArtifacts.zip'
      destinationFolder: ./Fuzzing/Opc.Ua.Encoders.Fuzz.Tests
      cleanDestinationFolder: false
      overwriteExistingFiles: true
    continueOnError: true
  - task: DotNetCoreCLI@2
    displayName: Restore ${{ parameters.configuration }}
    inputs:
      command: restore
      projects: $(file)
      arguments: '${{ variables.DotCliCommandline }} --configuration ${{ parameters.configuration }}'
  - task: DotNetCoreCLI@2
    displayName: Test ${{ parameters.configuration }}
    timeoutInMinutes: 90
    # continueOnError: a non-zero 'dotnet test' exit code no longer fails the job
    # directly - the "Evaluate test results" gate below decides pass/fail from the
    # emitted TRX. This is required because the hosted macOS agent intermittently
    # stalls the test host during PROCESS EXIT (after every test has already
    # passed and all teardowns have run; managed threads are frozen so no in-test
    # mitigation can fire), and the blame collector then kills the host with a
    # non-zero exit even though the run was functionally green. A real test
    # failure is still caught: it is recorded in the TRX and fails the gate.
    continueOnError: true
    inputs:
      command: test
      projects: $(file)
      # --blame-hang-timeout/--blame-hang-dump-type: kill (and name) any single test
      # that exceeds 10 min so silent hangs surface as "Test <Name> exceeded the
      # configured timeout" instead of burning the full 90-min step timeout with no
      # diagnostic info (observed on mac PR build 14598 log 933: 28 min of silence
      # after the previous test before the step timeout fired). LongRunning/Stress
      # tests are already filtered out, so 10 min is well above any legitimate run.
      # --blame-hang-dump-type mini: capture a minidump on hang so we can root-cause
      # teardown / shutdown hangs (observed on mac PR builds for Opc.Ua.History.Tests:
      # all tests pass, then a ~10-min silent teardown -> hang dump -> exit 1). A mini
      # dump still contains every thread's stack (what is stuck and what it is blocked
      # on) which is what a hang needs; a full dump additionally serializes the managed
      # heap, which for a server-hosting test process is several GB and impractical to
      # upload/download. It is only produced on an actual hang, so the cost is paid
      # rarely; the dump is published as a downloadable pipeline artifact below (it is
      # otherwise only reachable via the auth-gated test attachments API).
      # --logger trx + --results-directory: emit trx ourselves because we set
      # publishTestResults: false below to decouple "ran tests" from "published
      # results to AzDO" - the inline publish step inside DotNetCoreCLI@2 fails
      # the whole task on transient DNS / network blips when reaching back to
      # opcfoundation.visualstudio.com (observed on mac PR build 14614 log 737:
      # all 707 tests passed, then post-test publish errored with
      # "nodename nor servname provided, or not known" and failed the job).
      arguments: '--no-restore ${{ variables.DotCliCommandline }} --configuration ${{ parameters.configuration }} --filter "TestCategory!=LongRunning&TestCategory!=Stress" --blame-hang-timeout 10m --blame-hang-dump-type mini --logger trx --results-directory $(Agent.TempDirectory)'
      publishTestResults: false
  - task: PublishTestResults@2
    displayName: 'Publish Test Results ${{ parameters.configuration }} (${{ parameters.framework }})'
    # succeededOrFailed() so test results land in AzDO even when tests failed;
    # continueOnError so a transient publish failure (e.g. macOS hosted agent DNS
    # hiccup against opcfoundation.visualstudio.com) does not flip the job to
    # failed when the actual tests already passed.
    condition: succeededOrFailed()
    continueOnError: true
    inputs:
      testResultsFormat: VSTest
      testResultsFiles: '$(Agent.TempDirectory)/*.trx'
      mergeTestResults: true
      failTaskOnFailedTests: false
      testRunTitle: '${{ parameters.framework }} ${{ parameters.configuration }} - $(Agent.JobName)'
  - task: PowerShell@2
    displayName: 'Evaluate test results ${{ parameters.configuration }} (${{ parameters.framework }})'
    # Result-driven gate: the job's pass/fail is defined by the emitted TRX, not
    # by the 'dotnet test' exit code (the test step runs with continueOnError).
    # Fails the job if any test failed/errored/timed-out/aborted, or if no results
    # were produced at all. Tolerates ONLY a non-zero exit when every recorded
    # test passed - i.e. the benign macOS test-host process-exit stall that the
    # blame collector turns into a non-zero exit after a fully green run. This
    # runs before the failure-only artifact steps below so their failed()
    # conditions still see a genuine failure.
    condition: succeededOrFailed()
    inputs:
      targetType: inline
      script: |
        $ErrorActionPreference = 'Stop'
        $dir = "$(Agent.TempDirectory)"

        function Get-CounterValue([System.Xml.XmlElement] $element, [string] $name) {
            $raw = $element.GetAttribute($name)
            if ([string]::IsNullOrEmpty($raw)) { return 0 }
            return [int]$raw
        }

        $trx = @(Get-ChildItem -Path $dir -Filter *.trx -ErrorAction SilentlyContinue)
        if ($trx.Count -eq 0) {
            # No VSTest TRX in the results directory. This is expected for
            # Microsoft.Testing.Platform (MTP) test projects, which do not emit a
            # VSTest-style TRX there. For those, defer to the test host's own exit
            # code as reflected by Agent.JobStatus: 'Succeeded' means the test step
            # (and every prior step) exited cleanly -> pass; anything else (the
            # continueOnError test step exited non-zero, or an earlier step failed)
            # -> fail. This preserves the original exit-code behaviour for MTP
            # projects while the TRX path below tolerates the VSTest macOS at-exit
            # stall.
            $jobStatus = $env:AGENT_JOBSTATUS
            Write-Host "No VSTest TRX found in $dir; deferring to the test host exit (Agent.JobStatus=$jobStatus)."
            if ($jobStatus -eq 'Succeeded') {
                Write-Host "Test host exited cleanly; treating the run as successful."
                exit 0
            }
            Write-Host "##vso[task.logissue type=error]Test host did not exit cleanly and produced no TRX results."
            exit 1
        }
        $passed = 0
        $failed = 0
        $total = 0
        foreach ($f in $trx) {
            # Use XmlDocument.Load (not [xml](Get-Content ...)) so large TRX
            # files - PubSub emits ~9400 results, several MB - parse reliably;
            # the array-of-lines cast fails on big files ("Cannot convert value
            # System.String[]").
            $doc = New-Object System.Xml.XmlDocument
            try {
                $doc.Load($f.FullName)
            }
            catch {
                Write-Host "##vso[task.logissue type=error]Could not parse TRX $($f.Name): $($_.Exception.Message)"
                exit 1
            }
            foreach ($c in $doc.GetElementsByTagName('Counters')) {
                $passed += Get-CounterValue $c 'passed'
                $total += Get-CounterValue $c 'total'
                $failed += (Get-CounterValue $c 'failed') + (Get-CounterValue $c 'error') +
                    (Get-CounterValue $c 'timeout') + (Get-CounterValue $c 'aborted') +
                    (Get-CounterValue $c 'passedButRunAborted')
            }
        }
        Write-Host "Aggregated test results: total=$total, passed=$passed, failed/error/timeout/aborted=$failed (from $($trx.Count) trx file(s))."
        if ($failed -gt 0) {
            Write-Host "##vso[task.logissue type=error]$failed test(s) failed or the run was aborted mid-execution."
            exit 1
        }
        if ($total -le 0) {
            Write-Host "##vso[task.logissue type=error]No tests were recorded (total=0); the run did not execute."
            exit 1
        }
        Write-Host "No test failures recorded across $total test(s); treating the run as successful (tolerating any non-zero test-host exit after a fully green run)."
        exit 0
  - task: PublishBuildArtifacts@1
    displayName: 'Publish Fuzzing artifacts on failure'
    condition: and(failed(), contains(variables['file'], 'Fuzz.Tests'), ne(variables['fuzzingartifacts.secureFilePath'], ''))
    inputs:
      PathtoPublish: '$(Agent.TempDirectory)/FuzzingArtifacts.zip'
  # On job completion, collect any dumps written under the results directory
  # ($(Agent.TempDirectory)) and publish them as a downloadable pipeline
  # artifact.  Covers:
  #   - --blame-hang-dump-type mini / full hang dumps (*.dmp)
  #   - --blame-crash-dump-type mini / full crash dumps (*.dmp)
  #   - Linux core dumps (core / core.*)
  #   - Any other dump variant a test collector might emit (*.mdmp, *.dump)
  # The blame collector otherwise only attaches the dump to the trx, which is
  # reachable solely through the auth-gated test attachments API; publishing
  # them as build artifacts makes teardown/shutdown hangs and testhost crashes
  # (e.g. the macOS Opc.Ua.History.Tests 10-minute teardown hang) downloadable
  # for root-cause analysis.  The artifact name embeds the unique job id so
  # parallel matrix entries never collide.  succeededOrFailed() gates run on
  # both success and failure because the dotnet test task uses
  # publishTestResults: false + failTaskOnFailedTests: false, so a crash or
  # hang may not surface as failed() on this step even when the testhost
  # dumped; continueOnError swallows the PublishPipelineArtifact "no files"
  # error when no dumps were produced.
  - task: CopyFiles@2
    displayName: 'Stage diagnostic dumps'
    condition: succeededOrFailed()
    continueOnError: true
    inputs:
      SourceFolder: '$(Agent.TempDirectory)'
      Contents: |
        **/*.dmp
        **/*.mdmp
        **/*.dump
        **/core
        **/core.*
      TargetFolder: '$(Build.ArtifactStagingDirectory)/dumps'
      flattenFolders: true
  - task: PublishPipelineArtifact@1
    displayName: 'Publish diagnostic dumps'
    condition: succeededOrFailed()
    continueOnError: true
    inputs:
      targetPath: '$(Build.ArtifactStagingDirectory)/dumps'
      artifact: 'dumps-$(System.JobId)'