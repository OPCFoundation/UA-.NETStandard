name: Build and Test .NET 10.0

on:
  push:
    branches: [ master, main, develop/* ]
  pull_request:
    branches: [ master, main, develop/* ]
    paths:
    - '**.cs'
    - '**.csproj'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: test-${{matrix.os}}-${{matrix.csproj}}
    runs-on: ${{ matrix.os }}
    # The conformance test suite has ~3,257 NUnit fixtures, many of which
    # are [NonParallelizable] and exercise live keep-alive / publishing
    # timers. On hosted Ubuntu runners the suite can run >2 h under load;
    # cap individual jobs at 2.5 h so they fail fast rather than hitting
    # GitHub Actions' 6 h hard limit and reporting as "cancelled".
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        # os: [ubuntu-latest, windows-latest, macOS-latest] - disable mac os due to cost
        os: [ubuntu-latest, windows-latest]
        csproj: [Security.Certificates, Types, Core, Server, Client, Client.ComplexTypes, PubSub, Configuration, Gds, SourceGeneration.Stack, SourceGeneration, SourceGeneration.Core, Client.Conformance]
        include:
          - framework: 'net10.0'
            dotnet-version: '10.0.x'
            configuration: 'Release'
            customtesttarget: net10.0

    env:
      OS: ${{ matrix.os }}
      DOTNET_VERSION: ${{ matrix.dotnet-version }}
      CONFIGURATION:  ${{ matrix.configuration }}
      CSPROJ: ${{ matrix.csproj }}
      CSPROJECT: "./Tests/Opc.Ua.${{ matrix.csproj }}.Tests/Opc.Ua.${{ matrix.csproj }}.Tests.csproj"
      TESTRESULTS: "TestResults-${{matrix.csproj}}-${{matrix.os}}-${{matrix.framework}}-${{matrix.configuration}}"

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Set Cloud Version
      shell: pwsh
      run: ./.azurepipelines/set-version.ps1

    - name: Build
      run: dotnet build ${{ env.CSPROJECT }} --framework ${{ matrix.framework }} --configuration ${{ matrix.configuration }} /p:CustomTestTarget=${{ matrix.customtesttarget }}

    - name: Test
      # note: /p:CollectCoverage=true is only used to disable deterministic builds.
      # --blame-hang-timeout terminates the test host if a single test hangs > 5 min
      # and dumps a process dump, instead of letting the runner stall until GHA
      # evicts it. --blame writes a sequence.xml so we know which test was running.
      run: dotnet test ${{ env.CSPROJECT }} --no-build --framework ${{ matrix.framework }} --logger trx --configuration ${{ matrix.configuration }} /p:CollectCoverage=true /p:CustomTestTarget=${{ matrix.customtesttarget }} --collect:"XPlat Code Coverage" --settings ./Tests/coverlet.runsettings.xml --results-directory ${{ env.TESTRESULTS }} --blame --blame-hang-timeout 5m --blame-hang-dump-type mini

    - name: Upload test results
      uses: actions/upload-artifact@v7
      with:
        name: dotnet-results-${{matrix.csproj}}-${{matrix.os}}-${{matrix.framework}}-${{matrix.configuration}}
        path: ${{ env.TESTRESULTS }}
      # Use always() to always run this step to publish test results when there are test failures
      if: ${{ always() }}

    - name: Upload to Codecov
      uses: codecov/codecov-action@v6
      with:
        name: codecov-umbrella
        token: ${{ secrets.CODECOV_TOKEN }}
        directory: ${{ env.TESTRESULTS }}
        env_vars: CSPROJ,OS,DOTNET_VERSION,CONFIGURATION
        fail_ci_if_error: false
        #path_to_write_report: "./coverage/codecov_report-${{matrix.os}}-${{matrix.framework}}-${{matrix.configuration}}/"
        verbose: true
      # Use always() to always run this step to publish test results when there are test failures
      if: ${{ always() }}

  aot-test:
    name: aot-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - dotnet-version: '10.0.x'
            configuration: 'Release'

    env:
      AOTPROJECT: './Tests/Opc.Ua.Aot.Tests/Opc.Ua.Aot.Tests.csproj'

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Set Cloud Version
      shell: pwsh
      run: ./.azurepipelines/set-version.ps1

    - name: Publish NativeAOT
      run: dotnet publish ${{ env.AOTPROJECT }} --configuration ${{ matrix.configuration }}

    - name: Run NativeAOT Tests (Linux)
      if: runner.os == 'Linux'
      run: ./Tests/Opc.Ua.Aot.Tests/bin/${{ matrix.configuration }}/net10.0/linux-x64/publish/Opc.Ua.Aot.Tests

    - name: Run NativeAOT Tests (Windows)
      if: runner.os == 'Windows'
      run: ./Tests/Opc.Ua.Aot.Tests/bin/${{ matrix.configuration }}/net10.0/win-x64/publish/Opc.Ua.Aot.Tests.exe

    - name: Upload test results
      uses: actions/upload-artifact@v7
      with:
        name: aot-results-${{ matrix.os }}
        path: '**/TestResults/**'
      if: ${{ always() }}

    - name: Upload HTML Test Report
      uses: actions/upload-artifact@v7
      with:
        name: TestReport-aot-${{ matrix.os }}
        path: '**/*-report.html'
      if: ${{ always() }}
