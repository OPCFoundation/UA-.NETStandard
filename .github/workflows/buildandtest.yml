name: Build and Test .NET 10.0

on:
  push:
    branches: [ master, main, master378, develop/* ]
  pull_request:
    branches: [ master, main, master378, develop/* ]
    paths:
    - '**.cs'
    - '**.csproj'
    # Build/config files affect compilation across TFMs, so the all-TFM build
    # jobs must run when they change (e.g. targets.props, Directory.Packages.props,
    # Directory.Build.props/targets, the solution, and this workflow itself).
    - '**.props'
    - '**.targets'
    - '**.slnx'
    - '**.sln'
    - 'global.json'
    - 'nuget.config'
    - 'NuGet.config'
    - '.github/workflows/buildandtest.yml'
  # Weekly nightly run mirroring azure-pipelines.yml — Sun 02:00 UTC.
  schedule:
    - cron: '0 2 * * 0'
  # Manual dispatch with an opt-in for macOS runners.
  workflow_dispatch:
    inputs:
      include_macos:
        description: 'Include macOS runners in the test / AoT matrix'
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    name: Discover test projects
    runs-on: ubuntu-latest
    outputs:
      csprojs: ${{ steps.list.outputs.csprojs }}
      test_os: ${{ steps.list.outputs.test_os }}
      aot_matrix: ${{ steps.list.outputs.aot_matrix }}
    steps:
    - uses: actions/checkout@v7
    - name: Enumerate Tests/Opc.Ua.*.Tests projects
      id: list
      shell: pwsh
      env:
        EVENT_NAME: ${{ github.event_name }}
        INCLUDE_MACOS: ${{ github.event.inputs.include_macos }}
      run: |
        # Discover test projects from the filesystem so this matrix does
        # not have to be hand-maintained as projects are added/renamed.
        # Projects whose name is in EXCLUDE are run by other workflows
        # (AOT has its own workflow; the Stress suite is opt-in via the
        # stress-test workflow).
        $exclude = @('Aot', 'Stress')
        $projects = Get-ChildItem -Path Tests -Directory -Filter 'Opc.Ua.*.Tests' |
            Where-Object { Test-Path (Join-Path $_.FullName "$($_.Name).csproj") } |
            ForEach-Object { $_.Name -replace '^Opc\.Ua\.', '' -replace '\.Tests$', '' } |
            Where-Object { $exclude -notcontains $_ } |
            Sort-Object
        $json = ConvertTo-Json -InputObject @($projects) -Compress
        Write-Host "Discovered $(@($projects).Count) project(s): $json"
        "csprojs=$json" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

        # macOS is opt-in on pull_request events (default off) and included
        # by default on push/schedule/workflow_dispatch.  When dispatched
        # manually the include_macos input can be flipped to false to skip.
        $includeMac = switch ($env:EVENT_NAME) {
            'pull_request' { $false }
            'workflow_dispatch' { $env:INCLUDE_MACOS -eq 'true' }
            default { $true }
        }
        $testOs = @('ubuntu-latest')
        $aotMatrix = @(@{ os = 'ubuntu-latest'; rid = 'linux-x64' })
        if ($includeMac) {
            $testOs += 'macOS-latest'
            $aotMatrix += @{ os = 'macos-13';     rid = 'osx-x64'  }
            $aotMatrix += @{ os = 'macos-latest'; rid = 'osx-arm64' }
        }
        Write-Host "Event=$($env:EVENT_NAME); include_macos=$includeMac"
        Write-Host "test_os=$($testOs -join ', ')"
        "test_os=$(ConvertTo-Json -InputObject @($testOs) -Compress)"       | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "aot_matrix=$(ConvertTo-Json -InputObject @($aotMatrix) -Compress)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  build-and-test:
    needs: discover
    name: test-${{matrix.os}}-${{matrix.csproj}}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS is on by default for push/schedule/workflow_dispatch and
        # off by default on pull_request; controlled via discover.test_os.
        os: ${{ fromJSON(needs.discover.outputs.test_os) }}
        csproj: ${{ fromJSON(needs.discover.outputs.csprojs) }}
        include:
          - framework: 'net10.0'
            dotnet-version: '10.0.x'
            configuration: 'Release'
            customtesttarget: net10.0

    env:
      OS: ${{ matrix.os }}
      DOTNET_VERSION: ${{ matrix.dotnet-version }}
      CONFIGURATION:  ${{ matrix.configuration }}
      CSPROJ: ${{ matrix.csproj }}
      CSPROJECT: "./Tests/Opc.Ua.${{ matrix.csproj }}.Tests/Opc.Ua.${{ matrix.csproj }}.Tests.csproj"
      TESTRESULTS: "TestResults-${{matrix.csproj}}-${{matrix.os}}-${{matrix.framework}}-${{matrix.configuration}}"

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Setup .NET ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Set Cloud Version
      shell: pwsh
      run: ./.azurepipelines/set-version.ps1

    - name: Build
      run: dotnet build ${{ env.CSPROJECT }} --framework ${{ matrix.framework }} --configuration ${{ matrix.configuration }} /p:CustomTestTarget=${{ matrix.customtesttarget }} /p:UseSharedCompilation=false -maxcpucount:1

    - name: Test
      # note: /p:CollectCoverage=true is only used to disable deterministic builds
      shell: pwsh
      run: |
        $testArgs = @(
          '${{ env.CSPROJECT }}',
          '--no-build',
          '--framework',
          '${{ matrix.framework }}',
          '--logger',
          'trx',
          '--configuration',
          '${{ matrix.configuration }}',
          '/p:CollectCoverage=true',
          '/p:CustomTestTarget=${{ matrix.customtesttarget }}',
          '--collect:XPlat Code Coverage',
          '--settings',
          './Tests/coverlet.runsettings.xml',
          '--results-directory',
          '${{ env.TESTRESULTS }}')

        if ('${{ matrix.csproj }}' -eq 'Channels.Stress')
        {
          $testArgs += @('--filter', '(Category=Contract|Category=Integration)&Category!=ChaosTCP&Category!=Soak')
        }

        dotnet test @testArgs

    - name: Upload test results
      uses: actions/upload-artifact@v7
      with:
        name: dotnet-results-${{matrix.csproj}}-${{matrix.os}}-${{matrix.framework}}-${{matrix.configuration}}
        path: ${{ env.TESTRESULTS }}
      # Use always() to always run this step to publish test results when there are test failures
      if: ${{ always() }}

    - name: Upload to Codecov
      uses: codecov/codecov-action@v7
      with:
        name: codecov-umbrella
        token: ${{ secrets.CODECOV_TOKEN }}
        directory: ${{ env.TESTRESULTS }}
        env_vars: CSPROJ,OS,DOTNET_VERSION,CONFIGURATION
        fail_ci_if_error: false
        #path_to_write_report: "./coverage/codecov_report-${{matrix.os}}-${{matrix.framework}}-${{matrix.configuration}}/"
        verbose: true
      # Use always() to always run this step to publish test results when there are test failures
      if: ${{ always() }}

  aot-test:
    needs: discover
    name: aot-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # OS + RID pairs computed by `discover` so macOS entries drop out
        # entirely on pull_request (default off).  Windows AoT is covered
        # by the AzDO testaot stage.
        include: ${{ fromJSON(needs.discover.outputs.aot_matrix) }}

    env:
      AOTPROJECT: './Tests/Opc.Ua.Aot.Tests/Opc.Ua.Aot.Tests.csproj'
      DOTNET_VERSION: '10.0.x'
      CONFIGURATION: 'Release'

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Setup .NET ${{ env.DOTNET_VERSION }}
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Set Cloud Version
      shell: pwsh
      run: ./.azurepipelines/set-version.ps1

    - name: Publish NativeAOT
      run: dotnet publish ${{ env.AOTPROJECT }} --configuration ${{ env.CONFIGURATION }}

    - name: Run NativeAOT Tests
      run: ./Tests/Opc.Ua.Aot.Tests/bin/${{ env.CONFIGURATION }}/net10.0/${{ matrix.rid }}/publish/Opc.Ua.Aot.Tests

    - name: Upload test results
      uses: actions/upload-artifact@v7
      with:
        name: aot-results-${{ matrix.os }}
        path: '**/TestResults/**'
      if: ${{ always() }}

    - name: Upload HTML Test Report
      uses: actions/upload-artifact@v7
      with:
        name: TestReport-aot-${{ matrix.os }}
        path: '**/*-report.html'
      if: ${{ always() }}

  # Full UA.slnx build across every target framework, in parallel with the unit
  # tests, split across two runners: Windows builds the .NET Framework /
  # netstandard2.0 targets (which require the .NET Framework reference
  # assemblies) and Linux builds the modern .NET / netstandard2.1 targets.
  # Each TFM is built by pinning the solution to it via CustomTestTarget (the
  # same mechanism the Azure full build uses). All TFMs are attempted so a
  # single failure reports every broken TFM; the job fails if any TFM fails.
  build-all-tfm-windows:
    name: build-windows-all-tfm
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Set Cloud Version
      shell: pwsh
      run: ./.azurepipelines/set-version.ps1

    - name: Build UA.slnx for .NET Framework target frameworks
      shell: pwsh
      run: |
        # net472/net48/netstandard2.0 are .NET Framework targets (netstandard2.0
        # maps onto net48 for apps/tests) and require the .NET Framework
        # reference assemblies, so they are built on Windows. The modern .NET and
        # netstandard2.1 targets are built on Linux by build-all-tfm-linux.
        $tfms = @('net472', 'net48', 'netstandard2.0')
        $failed = @()
        foreach ($tfm in $tfms) {
          Write-Host "::group::Build UA.slnx ($tfm)"
          dotnet build UA.slnx --configuration Release /p:CustomTestTarget=$tfm /p:UseSharedCompilation=false
          if ($LASTEXITCODE -ne 0) {
            $failed += $tfm
            Write-Host "::error::UA.slnx build failed for $tfm"
          }
          Write-Host "::endgroup::"
        }
        if ($failed.Count -gt 0) {
          Write-Host "UA.slnx build failed for: $($failed -join ', ')"
          exit 1
        }
        Write-Host "UA.slnx built successfully for all target frameworks."

  build-all-tfm-linux:
    name: build-linux-all-tfm
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x

    - name: Set Cloud Version
      shell: pwsh
      run: ./.azurepipelines/set-version.ps1

    - name: Build UA.slnx for all Linux-capable target frameworks
      shell: pwsh
      run: |
        # net472/net48/netstandard2.0 (which the build maps onto net48) are .NET
        # Framework targets and are not built on Linux.
        $tfms = @('net8.0', 'net9.0', 'net10.0', 'netstandard2.1')
        $failed = @()
        foreach ($tfm in $tfms) {
          Write-Host "::group::Build UA.slnx ($tfm)"
          dotnet build UA.slnx --configuration Release /p:CustomTestTarget=$tfm /p:UseSharedCompilation=false
          if ($LASTEXITCODE -ne 0) {
            $failed += $tfm
            Write-Host "::error::UA.slnx build failed for $tfm"
          }
          Write-Host "::endgroup::"
        }
        if ($failed.Count -gt 0) {
          Write-Host "UA.slnx build failed for: $($failed -join ', ')"
          exit 1
        }
        Write-Host "UA.slnx built successfully for all target frameworks."
