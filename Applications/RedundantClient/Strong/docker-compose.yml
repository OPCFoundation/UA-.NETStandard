# RedundantClient + RedundantServer — STRONG (Raft) topology: no data loss across failover.
#
# The contrast to ../docker-compose.yml (active/active eventual, which shows data loss). Here a
# fixed 3-node active/passive Raft cluster keeps the replicated Counter on a linearizable store,
# so exactly one replica writes and, on failover, a standby is promoted and CONTINUES the Counter
# from the shared state. The client makes the difference explicit in its log:
#     HA OK: Counter continued 121 -> 122 across failover (no data loss).
#
# Strong consistency needs a fixed odd quorum (3 nodes here), so this topology is NOT --scale-able
# — the server set is three named replicas. Use ../docker-compose.yml to scale (eventual) instead.
#
# Run from the repository ROOT (build context is the repo root):
#   docker compose -f Applications/RedundantClient/Strong/docker-compose.yml up --build
#
# Demonstrate FAILOVER with NO DATA LOSS:
#   1. Let it run; the client logs "Connected replica: '<id>'" and a steadily increasing Counter.
#   2. Kill the active writer (the Raft leader). Find it from the server logs
#      ("HA: replica <id> became ACTIVE writer") and stop it:
#        docker compose -f Applications/RedundantClient/Strong/docker-compose.yml stop server-a
#   3. Watch the CLIENT log: it reconnects to a surviving replica and logs
#        FAILOVER: now served by replica '<id>' ...
#        HA OK: Counter continued <n> -> <n+k> across failover (no data loss).
#      A brief CurrentTime gap may still be logged (the subscription is re-established on the new
#      server), but the replicated Counter VALUE is preserved by the Raft store.
#   4. The remaining 2 of 3 replicas keep a quorum; restart the stopped one to rejoin.
#
# No host ports are published; the client runs inside the compose network.

x-server: &server
  build:
    context: ../../..
    dockerfile: Applications/RedundantServer/Dockerfile
  image: opcua-redundant-server
  command: ["--port", "62543"]

services:
  server-a:
    <<: *server
    hostname: server-a
    environment:
      HA_HOST: server-a
      HA_NODE_ID: replica-a
      HA_MODE: ap
      HA_CONSISTENCY: strong
      REDUNDANCY_MODE: hot
      HA_INSECURE: "true"
      HA_RAFT_ID: "1"
      HA_RAFT_MEMBERS: "3"
      HA_RAFT_BIND: "tcp://0.0.0.0:6560"
      HA_RAFT_PEERS: "tcp://server-b:6560,tcp://server-c:6560"
      HA_REDUNDANT_PEERS: "urn:localhost:OPCFoundation:RedundantServer:replica-b|RedundantServer replica-b|opc.tcp://server-b:62543/RedundantServer,urn:localhost:OPCFoundation:RedundantServer:replica-c|RedundantServer replica-c|opc.tcp://server-c:62543/RedundantServer"

  server-b:
    <<: *server
    hostname: server-b
    environment:
      HA_HOST: server-b
      HA_NODE_ID: replica-b
      HA_MODE: ap
      HA_CONSISTENCY: strong
      REDUNDANCY_MODE: hot
      HA_INSECURE: "true"
      HA_RAFT_ID: "2"
      HA_RAFT_MEMBERS: "3"
      HA_RAFT_BIND: "tcp://0.0.0.0:6560"
      HA_RAFT_PEERS: "tcp://server-a:6560,tcp://server-c:6560"
      HA_REDUNDANT_PEERS: "urn:localhost:OPCFoundation:RedundantServer:replica-a|RedundantServer replica-a|opc.tcp://server-a:62543/RedundantServer,urn:localhost:OPCFoundation:RedundantServer:replica-c|RedundantServer replica-c|opc.tcp://server-c:62543/RedundantServer"

  server-c:
    <<: *server
    hostname: server-c
    environment:
      HA_HOST: server-c
      HA_NODE_ID: replica-c
      HA_MODE: ap
      HA_CONSISTENCY: strong
      REDUNDANCY_MODE: hot
      HA_INSECURE: "true"
      HA_RAFT_ID: "3"
      HA_RAFT_MEMBERS: "3"
      HA_RAFT_BIND: "tcp://0.0.0.0:6560"
      HA_RAFT_PEERS: "tcp://server-a:6560,tcp://server-b:6560"
      HA_REDUNDANT_PEERS: "urn:localhost:OPCFoundation:RedundantServer:replica-a|RedundantServer replica-a|opc.tcp://server-a:62543/RedundantServer,urn:localhost:OPCFoundation:RedundantServer:replica-b|RedundantServer replica-b|opc.tcp://server-b:62543/RedundantServer"

  client:
    build:
      context: ../../..
      dockerfile: Applications/RedundantClient/Dockerfile
    image: opcua-redundant-client
    depends_on:
      - server-a
      - server-b
      - server-c
    command:
      - "--server"
      - "opc.tcp://server-a:62543/RedundantServer"
      - "--autoaccept"
      - "--nosecurity"
      - "--duration"
      - "00:00:00"
