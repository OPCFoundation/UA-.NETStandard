# nginx TCP (stream) load balancer for the transparent-redundancy sample.
#
# Fronts the two replicas with ONE virtual OPC UA endpoint on port 62543 and
# round-robins new TCP connections across them. On a connection failure nginx
# marks the replica down (max_fails/fail_timeout) and routes the next connection
# to the survivor, so a client reconnecting after a replica fails lands on the
# healthy replica - and, because session state is mirrored, resumes transparently.
events {}

stream {
    upstream opcua_replicas {
        server server-a:62543 max_fails=1 fail_timeout=5s;
        server server-b:62543 max_fails=1 fail_timeout=5s;
    }

    server {
        listen 62543;
        proxy_pass opcua_replicas;
        proxy_connect_timeout 2s;
        # OPC UA channels are long-lived; do not time out an idle secure channel.
        proxy_timeout 10m;
        # On a connect/read failure, transparently retry the next replica.
        proxy_next_upstream on;
    }
}
