# Strongly-consistent (Raft) active/passive redundant OPC UA servers plus a managed client.
#
# Unlike docker-compose.active-passive.yml (whose default in-memory store is private to each
# container), this compose forms a real 3-node RaftCs cluster over NanoMsg: the shared key/value
# store, leader election, and single-use session nonce are linearizable and shared across every
# replica. Exactly one replica is the Raft leader (the active writer); the others are hot standbys
# that take over on leader loss. Losing one of three replicas keeps a quorum (2 of 3), so the
# cluster stays available.
#
# The build context is the repository root. Run from the repo root:
#   docker compose -f Applications/RedundantServer/docker-compose.raft.yml up --build
#
# OPC UA endpoints on the host: replica-a opc.tcp://localhost:62543/RedundantServer,
# replica-b :62544, replica-c :62545. The Raft transport (port 6560) stays on the internal
# network and is addressed by container DNS.

x-raft-server: &raft-server
  build:
    context: ../..
    dockerfile: Applications/RedundantServer/Dockerfile
  image: opcua-redundant-server
  command: ["--port", "62543"]

services:
  server-a:
    <<: *raft-server
    hostname: server-a
    environment:
      HA_HOST: server-a
      HA_NODE_ID: replica-a
      HA_MODE: ap
      HA_CONSISTENCY: strong
      REDUNDANCY_MODE: hot
      HA_RAFT_ID: "1"
      HA_RAFT_MEMBERS: "3"
      HA_RAFT_BIND: "tcp://0.0.0.0:6560"
      HA_RAFT_PEERS: "tcp://server-b:6560,tcp://server-c:6560"
      HA_REDUNDANT_PEERS: "urn:localhost:OPCFoundation:RedundantServer:replica-b|RedundantServer replica-b|opc.tcp://server-b:62543/RedundantServer,urn:localhost:OPCFoundation:RedundantServer:replica-c|RedundantServer replica-c|opc.tcp://server-c:62543/RedundantServer"
    ports:
      - "62543:62543"

  server-b:
    <<: *raft-server
    hostname: server-b
    environment:
      HA_HOST: server-b
      HA_NODE_ID: replica-b
      HA_MODE: ap
      HA_CONSISTENCY: strong
      REDUNDANCY_MODE: hot
      HA_RAFT_ID: "2"
      HA_RAFT_MEMBERS: "3"
      HA_RAFT_BIND: "tcp://0.0.0.0:6560"
      HA_RAFT_PEERS: "tcp://server-a:6560,tcp://server-c:6560"
      HA_REDUNDANT_PEERS: "urn:localhost:OPCFoundation:RedundantServer:replica-a|RedundantServer replica-a|opc.tcp://server-a:62543/RedundantServer,urn:localhost:OPCFoundation:RedundantServer:replica-c|RedundantServer replica-c|opc.tcp://server-c:62543/RedundantServer"
    ports:
      - "62544:62543"

  server-c:
    <<: *raft-server
    hostname: server-c
    environment:
      HA_HOST: server-c
      HA_NODE_ID: replica-c
      HA_MODE: ap
      HA_CONSISTENCY: strong
      REDUNDANCY_MODE: hot
      HA_RAFT_ID: "3"
      HA_RAFT_MEMBERS: "3"
      HA_RAFT_BIND: "tcp://0.0.0.0:6560"
      HA_RAFT_PEERS: "tcp://server-a:6560,tcp://server-b:6560"
      HA_REDUNDANT_PEERS: "urn:localhost:OPCFoundation:RedundantServer:replica-a|RedundantServer replica-a|opc.tcp://server-a:62543/RedundantServer,urn:localhost:OPCFoundation:RedundantServer:replica-b|RedundantServer replica-b|opc.tcp://server-b:62543/RedundantServer"
    ports:
      - "62545:62543"

  client:
    build:
      context: ../..
      dockerfile: Applications/RedundantClient/Dockerfile
    image: opcua-redundant-client
    depends_on:
      - server-a
      - server-b
      - server-c
    command:
      - "--server"
      - "opc.tcp://server-a:62543/RedundantServer"
      - "--autoaccept"
      - "--nosecurity"
      - "--duration"
      - "00:10:00"
