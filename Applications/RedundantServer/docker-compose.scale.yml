# Active/active eventual consistency (CRDT gossip) only. Dynamic Raft scaling is not supported here.
# Run from the repository root:
#   docker compose -f Applications/RedundantServer/docker-compose.scale.yml up --build --scale server=5

services:
  server:
    build:
      context: ../..
      dockerfile: Applications/RedundantServer/Dockerfile
    image: opcua-redundant-server
    environment:
      HA_MODE: aa
      HA_CONSISTENCY: eventual
      HA_PEER_DISCOVERY: dns
      HA_SERVICE_NAME: server
      HA_GOSSIP_PORT: "4840"
    entrypoint:
      - /bin/sh
      - -c
      - |
        export HA_HOST="$$(hostname)"
        export HA_NODE_ID="$${HA_NODE_ID:-$$(hostname)}"
        exec dotnet RedundantServer.dll --port 62543
