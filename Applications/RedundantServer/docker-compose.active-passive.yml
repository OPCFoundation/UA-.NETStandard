# Active/passive redundant OPC UA servers (leader election) plus a managed client.
#
# NOTE: this sample uses the default in-memory shared key/value store, which is NOT
# shared across containers. Each replica therefore elects against its own private
# store, so this compose demonstrates the redundancy wiring, endpoint and
# service-level metadata, and the client connection - not cross-container state
# transfer. For real active/passive HA, register a shared ISharedKeyValueStore
# (for example Redis) reachable by every replica; see
# Applications/RedundantServer/README.md ("Wire up a shared store for real HA").
#
# The build context is the repository root. Run from the repo root:
#   docker compose -f Applications/RedundantServer/docker-compose.active-passive.yml up --build
#
# OPC UA endpoints exposed on the host: replica-a opc.tcp://localhost:62543/RedundantServer
# and replica-b opc.tcp://localhost:62544/RedundantServer.

services:
  server-a:
    build:
      context: ../..
      dockerfile: Applications/RedundantServer/Dockerfile
    image: opcua-redundant-server
    hostname: server-a
    environment:
      HA_HOST: server-a
      HA_NODE_ID: replica-a
      HA_MODE: ap
      REDUNDANCY_MODE: hot
      HA_REDUNDANT_PEERS: "urn:localhost:OPCFoundation:RedundantServer:replica-b|RedundantServer replica-b|opc.tcp://server-b:62543/RedundantServer"
    command: ["--port", "62543"]
    ports:
      - "62543:62543"

  server-b:
    build:
      context: ../..
      dockerfile: Applications/RedundantServer/Dockerfile
    image: opcua-redundant-server
    hostname: server-b
    environment:
      HA_HOST: server-b
      HA_NODE_ID: replica-b
      HA_MODE: ap
      REDUNDANCY_MODE: hot
      HA_REDUNDANT_PEERS: "urn:localhost:OPCFoundation:RedundantServer:replica-a|RedundantServer replica-a|opc.tcp://server-a:62543/RedundantServer"
    command: ["--port", "62543"]
    ports:
      - "62544:62543"

  client:
    build:
      context: ../..
      dockerfile: Applications/RedundantClient/Dockerfile
    image: opcua-redundant-client
    depends_on:
      - server-a
      - server-b
    command:
      - "--server"
      - "opc.tcp://server-a:62543/RedundantServer"
      - "--autoaccept"
      - "--nosecurity"
      - "--duration"
      - "00:10:00"
