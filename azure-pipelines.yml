# Azure pipeline
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

parameters:
- name: managedPool
  displayName: 'Use managed agent pool'
  type: boolean
  default: false
- name: managedPoolName
  displayName: 'Managed agent pool name'
  type: string
  default: 'netstandard'
- name: managedPoolVmImage
  displayName: 'VM image override for managed pool agents'
  type: string
  default: ''

trigger:
  batch: 'true'
  branches:
    include:
    - 'master'
    - 'main'
    - 'release/*'
  paths:
    include:
    - '*'
    exclude:
    - 'Docs/**'
    - '**/*.md'
pr:
  autoCancel: 'true'
  drafts: 'false'
  branches:
    include:
    - '*'
  paths:
    include:
    - '*'

variables:
  FullBuild: ${{ ne(variables['Build.Reason'], 'PullRequest') }}
  ScheduledBuild: ${{ in(variables['Build.Reason'], 'Schedule', 'Manual') }}
  ${{ if parameters.managedPool }}:
    poolName: ${{ parameters.managedPoolName }}
    poolVmImage: ${{ parameters.managedPoolVmImage }}
  ${{ else }}:
    poolName: ''
    poolVmImage: ''

stages:
- stage: build
  displayName: 'Build .NET Core Samples'
  jobs:
  - template: .azurepipelines/ci.yml
- stage: buildnohttps
  dependsOn: []
  displayName: 'Build NoHttps .NET Core Samples'
  condition: ne(variables.FullBuild, 'False')
  jobs:
  - template: .azurepipelines/ci.yml
    parameters:
      buildoption: '-p:NoHttps=true'
      agents: '@{ linux = "ubuntu-24.04" }'
- stage: solutions
  dependsOn: []
  displayName: 'Build Solutions'
  jobs:
  - template: .azurepipelines/sln.yml
    parameters:
      poolImage: 'windows-2025-vs2026'
      jobnamesuffix: win2025
      # PR builds compile only UA.slnx; master/scheduled/manual/fork-PR builds
      # discover every *.slnx in the repository automatically.
      ${{ if eq(variables.FullBuild, 'False') }}:
        solutions: 'UA.slnx'
      ${{ else }}:
        solutions: ''
- stage: testrelease
  dependsOn: []
  displayName: 'Test Core and SDK Release'
  jobs:
  - template: .azurepipelines/test.yml
    parameters:
      configuration: Release
      framework: net48
      agents: '@{ windows = "windows-2025-vs2026" }'
      jobnamesuffix: net48
  - template: .azurepipelines/test.yml
    parameters:
      configuration: Release
      framework: net10.0
      agents: '@{ windows = "windows-2025-vs2026"; linux="ubuntu-24.04"; mac = "macOS-15"}'
      jobnamesuffix: net100
      customtestarget: net10.0
  - template: .azurepipelines/test-aot.yml
    parameters:
      configuration: Release
      agents: '@{ windows = "windows-2025-vs2026"; linux="ubuntu-24.04"}'
      jobnamesuffix: net100aot
- stage: testdebug
  dependsOn: [build]
  displayName: 'Test Core and SDK Debug'
  condition: and(succeeded(), ne(variables.ScheduledBuild, 'False'))
  jobs:
  - template: .azurepipelines/test.yml
    parameters:
      framework: net10.0
      configuration: Debug
      jobnamesuffix: net100debug
- stage: testnet90
  dependsOn: [build]
  displayName: 'Test .NET 9.0'
  condition: and(succeeded(), ne(variables.ScheduledBuild, 'False'))
  jobs:
  - template: .azurepipelines/test.yml
    parameters:
      framework: net9.0
      configuration: Release
      jobnamesuffix: net90
- stage: testnet80
  dependsOn: [build]
  displayName: 'Test .NET 8.0'
  condition: and(succeeded(), ne(variables.ScheduledBuild, 'False'))
  jobs:
  - template: .azurepipelines/test.yml
    parameters:
      framework: net8.0
      configuration: Release
      jobnamesuffix: net80
- stage: testnet472
  dependsOn: [build]
  displayName: 'Test .NET 4.7.2'
  condition: and(succeeded(), ne(variables.ScheduledBuild, 'False'))
  jobs:
  - template: .azurepipelines/test.yml
    parameters:
      framework: net472
      configuration: Release
      jobnamesuffix: net472
      agents: '@{ windows = "windows-2025-vs2026" }'
      customtestarget: net472
- stage: testnetstandard20
  dependsOn: [build]
  displayName: 'Test .NETStandard 2.0'
  condition: and(succeeded(), ne(variables.ScheduledBuild, 'False'))
  jobs:
  - template: .azurepipelines/test.yml
    parameters:
      framework: net48
      configuration: Release
      jobnamesuffix: netstandard20
      agents: '@{ windows = "windows-2025-vs2026"}'
      customtestarget: netstandard2.0
- stage: testnetstandard21
  dependsOn: [build]
  displayName: 'Test .NETStandard 2.1'
  condition: and(succeeded(), ne(variables.ScheduledBuild, 'False'))
  jobs:
  - template: .azurepipelines/test.yml
    parameters:
      framework: net8.0
      configuration: Release
      jobnamesuffix: netstandard21
      customtestarget: netstandard2.1
- stage: coverage
  dependsOn: [testdebug,testrelease]
  displayName: 'Code Coverage'
  condition: and(succeeded(), ne(variables.ScheduledBuild, 'False'))
  jobs:
  - template: .azurepipelines/testcc.yml
    parameters:
      configuration: Release
      poolImage: 'ubuntu-22.04'
      framework: net10.0
      jobnamesuffix: net100cc