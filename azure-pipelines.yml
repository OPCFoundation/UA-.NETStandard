# Azure pipeline
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

parameters:
- name: managedPool
  displayName: 'Use the netstandard Managed DevOps Pool (adds ImageOverride demands per OS)'
  type: boolean
  default: true

trigger:
  batch: 'true'
  branches:
    include:
    - 'master'
    - 'main'
    - 'release/*'
  paths:
    include:
    - '*'
    exclude:
    - 'Docs/**'
    - '**/*.md'
pr:
  autoCancel: 'true'
  drafts: 'true'
  branches:
    include:
    - '*'
  paths:
    include:
    - '*'

variables:
  FullBuild: ${{ ne(variables['Build.Reason'], 'PullRequest') }}
  ScheduledBuild: ${{ in(variables['Build.Reason'], 'Schedule', 'Manual') }}
  # When managedPool is true, route Windows/Linux jobs to the 'netstandard'
  # Managed DevOps Pool and select images via ImageOverride demands.  See
  # https://learn.microsoft.com/azure/devops/managed-devops-pools/configure-images#use-demands-to-specify-an-image
  # Mac jobs always run on Microsoft-hosted agents because Managed DevOps Pools
  # does not provide macOS images.
  ${{ if parameters.managedPool }}:
    poolName: 'netstandard'
    windowsImage: 'windows-2022-g2'
    linuxImage: 'ubuntu-22.04-g2'
  ${{ else }}:
    poolName: ''
    windowsImage: 'windows-2025-vs2026'
    linuxImage: 'ubuntu-24.04'
  macImage: 'macOS-15'

stages:
- stage: build
  dependsOn: []
  displayName: 'Build'
  jobs:
  - template: .azurepipelines/sln.yml
    parameters:
      poolImage: ${{ variables.windowsImage }}
      poolName: ${{ variables.poolName }}
      jobnamesuffix: win2025
      # PR builds discover every *.slnx (except UA Core Library.slnx, which is
      # a strict subset of UA.slnx) and restrict to a small TFM set so each
      # matrix job's bin tree fits on the managed-pool agent's small temp
      # disk; master/scheduled/manual/fork-PR builds also discover every
      # *.slnx (same exclude) but fan out across all supported TFMs.
      solutions: ''
      ${{ if eq(variables.FullBuild, 'False') }}:
        tfms: 'net10.0,net48'
      ${{ else }}:
        tfms: 'net472,net48,netstandard2.0,netstandard2.1,net8.0,net9.0,net10.0'
- stage: buildnohttps
  dependsOn: []
  displayName: 'Build NoHttps .NET Core Samples'
  # succeeded() wraps the gate so a user-issued build cancellation propagates;
  # without it the bare condition re-evaluates to true on cancel and the stage
  # keeps running.
  condition: and(succeeded(), ne(variables.FullBuild, 'False'))
  jobs:
  - template: .azurepipelines/ci.yml
    parameters:
      buildoption: '-p:NoHttps=true'
      agents: '@{ linux = "${{ variables.linuxImage }}" }'
      poolName: ${{ variables.poolName }}
      windowsImage: ${{ variables.windowsImage }}
- stage: testfastpr
  dependsOn: []
  displayName: 'Fast PR test'
  jobs:
  - template: .azurepipelines/test.yml
    parameters:
      configuration: Release
      framework: net48
      agents: '@{ windows = "${{ variables.windowsImage }}" }'
      jobnamesuffix: net48
      poolName: ${{ variables.poolName }}
      windowsImage: ${{ variables.windowsImage }}
  - template: .azurepipelines/test.yml
    parameters:
      configuration: Release
      framework: net10.0
      agents: '@{ mac = "${{ variables.macImage }}" }'
      jobnamesuffix: net100
      customtestarget: net10.0
      hosted: true
      poolName: ${{ variables.poolName }}
      windowsImage: ${{ variables.windowsImage }}
      # Skip macOS tests on draft GitHub PRs; non-PR builds and non-draft PRs
      # run them as usual.  Note: System.PullRequest.IsDraft is undocumented for
      # GitHub-PR triggers but exposed in practice; if it stops being set, the
      # condition safe-degrades to "always run mac".
      condition: or(ne(variables['Build.Reason'], 'PullRequest'), ne(variables['System.PullRequest.IsDraft'], 'True'))
- stage: testaot
  dependsOn: []
  displayName: 'Test Native AoT'
  condition: and(succeeded(), ne(variables.ScheduledBuild, 'False'))
  jobs:
  - template: .azurepipelines/test-aot.yml
    parameters:
      configuration: Release
      agents: '@{ windows = "${{ variables.windowsImage }}"; linux="${{ variables.linuxImage }}"}'
      jobnamesuffix: net100aot
      poolName: ${{ variables.poolName }}
      windowsImage: ${{ variables.windowsImage }}
- stage: testdebug
  dependsOn: [build]
  displayName: 'Test Core and SDK Debug'
  condition: and(succeeded(), ne(variables.ScheduledBuild, 'False'))
  jobs:
  - template: .azurepipelines/test.yml
    parameters:
      framework: net10.0
      configuration: Debug
      jobnamesuffix: net100debug
      poolName: ${{ variables.poolName }}
      windowsImage: ${{ variables.windowsImage }}
      agents: '@{ windows = "${{ variables.windowsImage }}"; linux = "${{ variables.linuxImage }}" }'
  - template: .azurepipelines/test.yml
    parameters:
      framework: net10.0
      configuration: Debug
      jobnamesuffix: net100debugmac
      agents: '@{ mac = "${{ variables.macImage }}" }'
      hosted: true
      poolName: ${{ variables.poolName }}
      windowsImage: ${{ variables.windowsImage }}
      # See testfastpr net100 comment: skip macOS tests on draft GitHub PRs.
      condition: or(ne(variables['Build.Reason'], 'PullRequest'), ne(variables['System.PullRequest.IsDraft'], 'True'))
- stage: testnet90
  dependsOn: [build]
  displayName: 'Test .NET 9.0'
  condition: and(succeeded(), ne(variables.ScheduledBuild, 'False'))
  jobs:
  - template: .azurepipelines/test.yml
    parameters:
      framework: net9.0
      configuration: Release
      jobnamesuffix: net90
      poolName: ${{ variables.poolName }}
      windowsImage: ${{ variables.windowsImage }}
      agents: '@{ windows = "${{ variables.windowsImage }}"; linux = "${{ variables.linuxImage }}" }'
  - template: .azurepipelines/test.yml
    parameters:
      framework: net9.0
      configuration: Release
      jobnamesuffix: net90mac
      agents: '@{ mac = "${{ variables.macImage }}" }'
      hosted: true
      poolName: ${{ variables.poolName }}
      windowsImage: ${{ variables.windowsImage }}
      # See testfastpr net100 comment: skip macOS tests on draft GitHub PRs.
      condition: or(ne(variables['Build.Reason'], 'PullRequest'), ne(variables['System.PullRequest.IsDraft'], 'True'))
- stage: testnet80
  dependsOn: [build]
  displayName: 'Test .NET 8.0'
  condition: and(succeeded(), ne(variables.ScheduledBuild, 'False'))
  jobs:
  - template: .azurepipelines/test.yml
    parameters:
      framework: net8.0
      configuration: Release
      jobnamesuffix: net80
      poolName: ${{ variables.poolName }}
      windowsImage: ${{ variables.windowsImage }}
      agents: '@{ windows = "${{ variables.windowsImage }}"; linux = "${{ variables.linuxImage }}" }'
  - template: .azurepipelines/test.yml
    parameters:
      framework: net8.0
      configuration: Release
      jobnamesuffix: net80mac
      agents: '@{ mac = "${{ variables.macImage }}" }'
      hosted: true
      poolName: ${{ variables.poolName }}
      windowsImage: ${{ variables.windowsImage }}
      # See testfastpr net100 comment: skip macOS tests on draft GitHub PRs.
      condition: or(ne(variables['Build.Reason'], 'PullRequest'), ne(variables['System.PullRequest.IsDraft'], 'True'))
- stage: testnet472
  dependsOn: [build]
  displayName: 'Test .NET 4.7.2'
  condition: and(succeeded(), ne(variables.ScheduledBuild, 'False'))
  jobs:
  - template: .azurepipelines/test.yml
    parameters:
      framework: net472
      configuration: Release
      jobnamesuffix: net472
      agents: '@{ windows = "${{ variables.windowsImage }}" }'
      customtestarget: net472
      poolName: ${{ variables.poolName }}
      windowsImage: ${{ variables.windowsImage }}
- stage: testnetstandard20
  dependsOn: [build]
  displayName: 'Test .NETStandard 2.0'
  condition: and(succeeded(), ne(variables.ScheduledBuild, 'False'))
  jobs:
  - template: .azurepipelines/test.yml
    parameters:
      framework: net48
      configuration: Release
      jobnamesuffix: netstandard20
      agents: '@{ windows = "${{ variables.windowsImage }}"}'
      customtestarget: netstandard2.0
      poolName: ${{ variables.poolName }}
      windowsImage: ${{ variables.windowsImage }}
- stage: testnetstandard21
  dependsOn: [build]
  displayName: 'Test .NETStandard 2.1'
  condition: and(succeeded(), ne(variables.ScheduledBuild, 'False'))
  jobs:
  - template: .azurepipelines/test.yml
    parameters:
      framework: net8.0
      configuration: Release
      jobnamesuffix: netstandard21
      customtestarget: netstandard2.1
      poolName: ${{ variables.poolName }}
      windowsImage: ${{ variables.windowsImage }}
      agents: '@{ windows = "${{ variables.windowsImage }}"; linux = "${{ variables.linuxImage }}" }'
  - template: .azurepipelines/test.yml
    parameters:
      framework: net8.0
      configuration: Release
      jobnamesuffix: netstandard21mac
      customtestarget: netstandard2.1
      agents: '@{ mac = "${{ variables.macImage }}" }'
      hosted: true
      poolName: ${{ variables.poolName }}
      windowsImage: ${{ variables.windowsImage }}
      # See testfastpr net100 comment: skip macOS tests on draft GitHub PRs.
      condition: or(ne(variables['Build.Reason'], 'PullRequest'), ne(variables['System.PullRequest.IsDraft'], 'True'))
- stage: coverage
  dependsOn: [testdebug,testfastpr]
  displayName: 'Code Coverage'
  condition: and(succeeded(), ne(variables.ScheduledBuild, 'False'))
  jobs:
  - template: .azurepipelines/testcc.yml
    parameters:
      configuration: Release
      poolImage: ${{ variables.linuxImage }}
      framework: net10.0
      jobnamesuffix: net100cc
      poolName: ${{ variables.poolName }}